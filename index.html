<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="board-container">
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Enter a new task...">
            <button id="addBtn">Add Task</button>
        </div>

        <div class="board">
            <div class="column" id="todo-col">
                <h3>📋 To Do</h3>
                <div class="tasks-container" id="todo"></div>
            </div>

            <div class="column" id="progress-col">
                <h3>⚡ In Progress</h3>
                <div class="tasks-container" id="inprogress"></div>
            </div>

            <div class="column" id="done-col">
                <h3>✅ Done</h3>
                <div class="tasks-container" id="done"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
